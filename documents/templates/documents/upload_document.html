{% extends "users/base.html" %}

{% block title %}
Upload Document
{% endblock %}

{% block content %}

<div class="card">

<h2>Upload Document</h2>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}
    {% if form.errors %}
    <div class="alert alert-danger">
        {{ form.errors }}
    </div>
{% endif %}
    {{ form.as_p }}

    <button type="submit">
        Upload
    </button>

</form>

</div>
<style>
    .container{
        width: 50%;
        margin:auto;
        padding:30px;
        justify-content: center;
    }
    h2{
        text-align: center;
        font-style: oblique;
        color: rgb(109, 166, 216);
    }
    .card{
        background:white;
        padding:25px;
        border-radius:8px;
        box-shadow:0 0 12px rgba(0,0,0,.1);
    }
    input{
        width:100%;
        padding:10px;
        margin:8px 0 18px 0;
        border-radius: 5px;
        box-sizing:border-box;
        border: 1px solid rgb(47, 213, 255);
        outline: none;
    }
    label{
        color: cadetblue;
    }
    button{
        width: 100%;
        color: white;
        background-color: rgb(109, 166, 216);
        border: none;
        cursor: pointer;
        padding: 10px;
        border-radius: 5px;
        font-weight: bold;
    }
    button:hover{
        background-color: rgb(0, 140, 255);
    }
    
</style>

{% endblock %}
