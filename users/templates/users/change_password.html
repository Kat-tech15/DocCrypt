{% extends "users/base.html" %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<div class="card">

    <h2>Change Password</h2>

    

    <form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">

    Update Password

    </button>

    </form>

</div>
<style>
    .container{
        width: 50%;
        padding: 30px;
        margin: auto;
        justify-content: center;
    }
    h2{
        text-align: center;
        font-style: oblique;
        color: rgb(48, 136, 212);
    }
    .card{
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    input{
        width: 100%;
        outline: none;
        padding: 10px;
        border-radius: 5px;
        box-sizing: border-box;
        border: 1px solid rgba(109, 166, 206);
    }
    label{
        color: cadetblue;
        font-family: 'Courier New', Courier, monospace;
    }
    button{
        width: 100%;
        color: white;
        font-weight: bold;
        border-radius: 5px;
        padding: 10px;
        border: none;
        cursor: pointer;
        outline: none;
        background-color: rgba(109, 166, 206);
    }
    button:hover{
        background-color: rgb(0, 140, 255);
    }
</style>


{% endblock %}
