{% extends "users/base.html" %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">

        <h2>Change Password</h2>

        

        <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">

            Update Password

            </button>
        </div>

        </form>
    </div>
</div>

{% endblock %}
