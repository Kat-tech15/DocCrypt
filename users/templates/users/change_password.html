{% extends "users/base.html" %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<div class="card">

<h2>Change Your Password</h2>

<p>
For security reasons, you must change the temporary password
before continuing.
</p>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">

Update Password

</button>

</form>

</div>

{% endblock %}
