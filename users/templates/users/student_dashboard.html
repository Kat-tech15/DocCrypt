{% extends "users/base.html" %}

{% block title %}
Student Dashboard
{% endblock %}

{% block content %}
<div class="card">
    <h2>Student Dashboard</h2>

    <p>Welcome, {{ request.user.username }}</p>

    <hr>

    <p class="button">
        <a href="{% url 'my_documents' %}">
            My Documents
        </a>
    </p>
</div>
<style>
    .container{
        width: 50%;
        padding: 30px;
        margin: auto;
        justify-content: center;
    }
    h2{
        text-align: center;
        font-style: oblique;
        color: rgb(109, 166, 216);
    }
    .card{
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    .button{
        cursor: pointer;
        width: 100%;
        text-align: center;
        background-color: rgba(109, 166, 206);
        border-radius: 5px;
        border: none;
        padding: 10px;
        
    }
    .button a{
        color: white;
        text-decoration: none;
        font-weight: bold;
    }
    button:hover{
        background-color: rgb(0, 140, 255);
    }
</style>
{% endblock %}
