{% extends "users/base.html" %}

{% block title %}
Administrator Dashboard
{% endblock %}

{% block content %}
<div class="card">
    <h2>Administrator Dashboard</h2>

    <p>Welcome, {{ request.user.username }}</p>

    <hr>

    <h3>Student Management</h3>

    {% for student in students %}
        <td>{{ student.count }}</td>
    {% endfor %}
    <hr>

    <h3>Document Management</h3>

</div>
{% endblock %}
