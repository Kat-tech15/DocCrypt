{% extends "users/base.html" %}

{% block title %}
    Login
{% endblock %}

{% block content %}
<div class="card">
    <h2>Login</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Login
        </button>

    </form>
</div>
<style>
    .container{
        width: 50%;
        margin: auto;
        padding: 30px;
        justify-content: center;
    }
    h2{
        text-align: center;
        font-style: oblique;
        color: rgb(109, 166, 216);
    }
    .card{
        background: white;
        border-radius: 8px;
        padding: 25px;
        box-shadow:0 0 12px rgba(0,0,0,.1);
    }
    input{
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        outline: none;
        box-sizing: border-box;
        border: 1px solid #2fd5ff;
    }
    label{
        color: cadetblue;
        font-family: 'Courier New', Courier, monospace;
    }
    button{
        width: 100%;
        color: white;
        text-align: center;
        border: none;
        padding: 10px;
        cursor: pointer;
        font-weight: bold;
        border-radius: 5px;
        background-color: rgb(109, 166, 216);
    }
    button:hover{
        background-color: rgb(0, 140, 255);
    }
</style>
 {% endblock %}
