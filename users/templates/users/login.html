{% extends "users/base.html" %}

{% block title %}
    Login
{% endblock %}

{% block content %}

<h2>Login</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Login
    </button>

</form>
<style>
    form {
        background-color: rgb(9, 110, 110);
        padding: 15px 10px;
        border-radius: 15px;
        align-items: center;
        color: white;
        font-family: Verdana, Geneva, Tahoma, sans-serif;        
    }
    input {
        width: 50%;
        border-radius: 15px;
        border: 1px solid aqua;
        outline: none;

    }
    button {
        width: 50%;
        border-radius: 15px;
        justify-content: center;
    }
</style>
 {% endblock %}
