{% extends "users/base.html" %}

{% block title %}
    Register
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>

        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    Register Student
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
