<!DOCTYPE html>
<html>
<head>
    <title>Register Student</title>
</head>
<body>

<h2>Create Student Account</h2>

{% if messages %}
    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Register Student
    </button>

</form>

</body>
</html>
