{% extends "users/base.html" %}

{% block title %}
    Register
{% endblock %}

{% block content %}
<div class="card">
    <h2>Create Account</h2>

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="buttonz">
            Register Student
        </button>

    </form>
</div>
<style>
    .container{
        width: 50%;
        margin:auto;
        padding:30px;
        justify-content: center;
    }
    h2{
        text-align: center;
        font-style: oblique;
        color: rgb(109, 166, 216);
    }
    .card{
        background:white;
        padding:25px;
        border-radius:8px;
        box-shadow:0 0 12px rgba(0,0,0,.1);
    }
    input{
        width: 100%;
        padding: 10px;
        outline: none;
        border-radius: 5px;
        box-sizing: border-box;
        border: 1px solid #2fd5ff;
    }
    label{
        color: cadetblue;
        font-family: 'Courier New', Courier, monospace;
    }
    button{
        width: 100%;
        border-radius: 5px;
        border: none;
        color: white;
        font-weight: bold;
        padding: 10px;
        cursor: pointer;
        background-color: rgb(109, 166, 206);
    }
    button:hover{
        background-color: rgb(0, 140, 255);
    }
    
</style>
{% endblock %}
