<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DocCrypt{% endblock %}</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f6f9;
            margin:0;
        }

        header{
            background:#0d6efd;
            color:white;
            padding:18px;
        }

        .container{
            width:85%;
            margin:auto;
            padding:30px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:8px;
            box-shadow:0 0 12px rgba(0,0,0,.1);
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0 18px 0;
            box-sizing:border-box;
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:12px 20px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#084298;
        }

    </style>

</head>

<body>

<header>

<h2>DocCrypt - Student Document Encryption System</h2>

</header>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
