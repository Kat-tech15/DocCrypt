<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DocCrypt{% endblock %}</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f6f9;
            margin:0;
        }

        header{
            background:#4a84db;
            color:white;
            padding:18px;
        }
        span{
            color: red;

        }
        .btn{
            background:#0d6efd;
            color:white;
            border:none;
            padding:12px 20px;
            cursor:pointer;
            border-radius:5px;
            margin: 5px 50%;
        }

        .btn:hover{
            background:#084298;
        }
        .btn a{
            text-decoration: none;
            color: white;
        }
    </style>

</head>

<body>

<header>
            
</header>

<div class="container">

{% block content %}
<section class="home">
    <p>Welcome to the Doc <span>Crypt</span></p>
    <p>We make your documents secure by encrypting them.</p>
</section>
    <div >
        <button class="btn">
            <a href="{% url 'upload_document' %}">Upload</a>
        </button>
        <button class="btn">
            <a href="{% url 'my_documents' %}">View</a>
        </button>
    </div>
{% endblock %}

</div>

</body>
</html>
